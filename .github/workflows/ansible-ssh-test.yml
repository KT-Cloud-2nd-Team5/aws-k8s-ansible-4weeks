name: ansible-ssh-test

on:
  push:
    branches:
      - main

jobs:
  test-ansible-ssh:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # SSH 키 로드 
      - name: Start ssh-agent and add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # SSH 에이전트에 키가 올라갔는지 확인
      - name: Verify SSH agent
        run: |
          ssh-add -l

      # (임시) 단일 노드 SSH 테스트
      - name: Test SSH to master
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@<MASTER_PRIVATE_IP> "hostname"

      - name: Ansible ping test
        run: |
          ansible -i inventory/hosts.ini all -m ping