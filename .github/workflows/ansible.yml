name: Ansible CI/CD (Bastion Runner) # GitHub Actions 탭에 표시될 워크플로우 이름

on:
  push:
    branches: ["main"] # main 브랜치에 코드가 push될 때 실행
    paths:             # 아래 폴더나 파일이 변경되었을 때만 실행 (불필요한 실행 방지)
      - "playbooks/**" # 플레이북 파일들
      - "roles/**"     # 앤서블 역할(Role) 파일들
      - "inventory/**" # 인벤토리(서버 목록) 파일
      - "group_vars/**" # 그룹 변수 파일
      - "ansible.cfg"  # 앤서블 설정 파일
      - ".github/workflows/ansible.yml" # 워크플로우 설정 파일

  workflow_dispatch: # GitHub 웹사이트에서 버튼을 눌러 수동으로도 실행 가능하게 하는 기능

jobs:
  ansible-site:
    runs-on: self-hosted  # AWS에서 직접 생성한 서버(Bastion 등)에서 실행

    # workflow_run으로 들어왔을 때는 CI가 성공한 경우에만 실행되도록 제한
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      # 처음 접속하는 서버의 SSH 키 확인 과정을 생략하기 위한 설정

      ANSIBLE_SSH_COMMON_ARGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      # SSH 접속 시 보안 경고를 무시하고 known_hosts 파일에 기록하지 않도록 설정

      DOCKER_IMAGE: "kimkiyeol/web-app"
      # Docker Hub 이미지 주소

    steps:
      - name: Checkout code
        # GitHub에 있는 최신 코드를 현재 Runner 서버로 내려받음
        uses: actions/checkout@v4
        with:
          # workflow_run이면 CI가 성공한 커밋(head_sha)으로 체크아웃을 고정
          # 그 외(push/workflow_dispatch)는 현재 실행 커밋으로 체크아웃
          fetch-depth: 0 # 전체 히스토리를 가져와 파일 누락 방지
      - name: Load SSH key (ssh-agent)
        # 대상 서버들에 접속할 때 사용할 SSH 개인키를 메모리에 로드
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify SSH agent
        # SSH 키가 정상적으로 ssh-agent에 로드되었는지 확인
        run: |
          ssh-add -l

      - name: Install Ansible
        # 현재 Runner 서버에 Ansible이 설치되어 있지 않다면 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Connectivity check
        # inventory에 등록된 모든 서버들과 SSH 통신이 가능한지 확인
        run: |
          ansible -i inventory/inventory.ini all -m ping

      - name: Syntax check (site.yml)
        # 플레이북 실행 전 site.yml에 문법 오류가 없는지 확인
        run: |
          ansible-playbook -i inventory/inventory.ini playbooks/site.yml --syntax-check

      - name: Run site.yml
        # site.yml을 실행하여 이미지 교체 배포 수행
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG=${GITHUB_SHA}
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          else
            IMAGE_TAG=${GITHUB_SHA}
          fi

          ansible-playbook -i inventory/inventory.ini playbooks/site.yml \
            --extra-vars "image_repo=${DOCKER_IMAGE} image_tag=${IMAGE_TAG}"
