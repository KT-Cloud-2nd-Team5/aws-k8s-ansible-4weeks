  name: Ansible CI/CD (Bastion Runner) # GitHub Actions 탭에 표시될 워크플로우 이름

  on:
    push:
      branches: ["main"] # main 브랜치에 코드가 push될 때 실행
      paths:             # 아래 폴더나 파일이 변경되었을 때만 실행
        - "playbooks/**"
        - "roles/**"
        - "inventory/**"
        - "group_vars/**"
        - "ansible.cfg"
        - ".github/workflows/ansible.yml"

    workflow_dispatch: # 수동 실행 기능

  jobs:
    ansible-site:
      runs-on: self-hosted  # AWS Bastion 서버에서 실행

      # workflow_run 트리거일 경우, CI가 성공했을 때만 실행
      if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        ANSIBLE_SSH_COMMON_ARGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        DOCKER_IMAGE: "kimkiyeol/web-app"

      steps:
        - name: Checkout code
          # [핵심 수정 2] 복잡한 ref 설정을 제거하고 기본값(최신 코드) 사용
          uses: actions/checkout@v4

        - name: Load SSH key (ssh-agent)
          # 대상 서버 접속용 SSH 키 로드
          uses: webfactory/ssh-agent@v0.9.0
          with:
            ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

        - name: Verify SSH agent
          run: |
            ssh-add -l

        - name: Install Ansible
          # Runner에 Ansible이 없으면 설치
          run: |
            sudo apt-get update
            sudo apt-get install -y ansible

        # 1. pip3 명령어가 없는 경우 설치 (에러 127 방지)
        # 2. Ansible 엔진 업그레이드 (최신 모듈 호환성 확보)
        # 3. 필요한 모든 컬렉션 설치 (Docker 및 Kubernetes)
        - name: Setup Ansible Environment and Collections
          run: |
            if! command -v pip3 &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y python3-pip
            fi
            python3 -m pip install --upgrade pip
            pip3 install -U ansible-core
            ansible-galaxy collection install community.docker kubernetes.core --force

        # [디버깅용] 파일이 잘 보이는지 확인 (성공 후 삭제 가능)
        - name: Debug - Check File Existence
          run: |
            ls -l playbooks/site.yml

        - name: Connectivity check
          # 통신 확인
          run: |
            ansible -i inventory/inventory.ini all -m ping

        - name: Syntax check (site.yml)
          # 문법 검사
          run: |
            ansible-playbook -i inventory/inventory.ini playbooks/site.yml --syntax-check

        - name: Run site.yml
          # 실제 플레이북 실행
          run: |
            # [추가한곳] 배포 태그는 항상 latest로 고정
            IMAGE_TAG=latest

            echo "Deploying Tag: $IMAGE_TAG"

            ansible-playbook -i inventory/inventory.ini playbooks/site.yml \
              --extra-vars "image_repo=${DOCKER_IMAGE} image_tag=${IMAGE_TAG}"
