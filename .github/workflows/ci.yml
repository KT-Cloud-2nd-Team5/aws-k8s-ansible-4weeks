name: CI/CD - Build, Push, Deploy

on:
  push:
    branches:
      - "main"
      - "test-cicd"
      - "optimization"
    paths:
      # - "app/**"
      # # CD 코드가 바뀌어도 동작하게 포함(권장)
      # - "playbooks/cd.yml"
      # - "roles/k8s_deploy/**"
      # - "inventory/**"
      # - "ansible.cfg"

concurrency:
  group: ci-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted

    env:
      DOCKER_IMAGE: "kimkiyeol/web-app"   # DockerHub repo (팀 공용이면 여기만 바꾸면 됨)
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ap-northeast-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #  ssh-agent로 키 로드 (파일 저장 X)
      - name: Load SSH key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify SSH agent
        run: ssh-add -l

      - name: Install Python dependencies for Ansible AWS
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install boto3 botocore

      - name: Install Docker
        run: |
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          docker --version

      - name: Install Ansible
        run: |
          set -e
          if ! command -v ansible-playbook >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ansible
          fi
          ansible --version

      - name: Docker Login
        run: |
          set -e
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      #  여기서 SHORT_SHA 계산 + 다음 step에서 쓰도록 환경변수로 저장
      - name: Prepare image tag
        run: |
          set -e
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_FULL=${DOCKER_IMAGE}:${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${DOCKER_IMAGE}:latest" >> $GITHUB_ENV
          echo "[INFO] IMAGE_FULL=${DOCKER_IMAGE}:${SHORT_SHA}"
          echo "[INFO] IMAGE_LATEST=${DOCKER_IMAGE}:latest"

      - name: Build & Push Image (SHORT_SHA)
        run: |
          set -e
          docker build -t "${DOCKER_IMAGE}:${SHORT_SHA}" -t "${DOCKER_IMAGE}:latest" ./app
          docker push "${DOCKER_IMAGE}:${SHORT_SHA}"
          docker push "${DOCKER_IMAGE}:latest"

      #  CD: 방금 푸시한 이미지 태그 그대로 전달
      - name: Deploy (Ansible CD)
        run: |
          ansible-playbook -i inventory/aws_ec2.yml playbooks/cd.yml





