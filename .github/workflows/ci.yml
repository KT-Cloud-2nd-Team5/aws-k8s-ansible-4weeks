name: CI/CD - Build, Push, Deploy

on:
  push:
    branches: ["hoseong"]
    paths:
      - "app/**"
      # CD мҪ”л“ңк°Җ л°”лҖҢм–ҙлҸ„ лҸҷмһ‘н•ҳкІҢ нҸ¬н•Ё(к¶ҢмһҘ)
      - "playbooks/cd.yml"
      - "roles/k8s_deploy/**"
      - "inventory/**"
      - "ansible.cfg"

concurrency:
  group: ci-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted

    env:
      DOCKER_IMAGE: "kimkiyeol/web-app"   # DockerHub repo (нҢҖ кіөмҡ©мқҙл©ҙ м—¬кё°л§Ң л°”кҫёл©ҙ лҗЁ)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #  ssh-agentлЎң нӮӨ лЎңл“ң (нҢҢмқј м ҖмһҘ X)
      - name: Load SSH key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify SSH agent
        run: ssh-add -l

      - name: Install Docker
        run: |
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          docker --version

      - name: Install Ansible
        run: |
          set -e
          if ! command -v ansible-playbook >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ansible
          fi
          ansible --version

      - name: Install Python dependencies for Ansible AWS
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install boto3 botocore
      - name: Docker Login
        run: |
          set -e
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      #  м—¬кё°м„ң SHORT_SHA кі„мӮ° + лӢӨмқҢ stepм—җм„ң м“°лҸ„лЎқ нҷҳкІҪліҖмҲҳлЎң м ҖмһҘ
      - name: Prepare image tag
        run: |
          set -e
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_FULL=${DOCKER_IMAGE}:${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${DOCKER_IMAGE}:latest" >> $GITHUB_ENV
          echo "[INFO] IMAGE_FULL=${DOCKER_IMAGE}:${SHORT_SHA}"
          echo "[INFO] IMAGE_LATEST=${DOCKER_IMAGE}:latest"

      - name: Build & Push Image (SHORT_SHA)
        run: |
          set -e
          docker build -t "${DOCKER_IMAGE}:${SHORT_SHA}" -t "${DOCKER_IMAGE}:latest" ./app
          docker push "${DOCKER_IMAGE}:${SHORT_SHA}"
          docker push "${DOCKER_IMAGE}:latest"

      #  CD: л°©кёҲ н‘ёмӢңн•ң мқҙлҜём§Җ нғңк·ё к·ёлҢҖлЎң м „лӢ¬
      - name: Deploy (Ansible CD)
        run: |
          set -e
          ansible-playbook -i inventory/ playbooks/cd.yml \
            -e "image_full=${IMAGE_LATEST} namespace=default deployment=web-nginx container=nginx"
