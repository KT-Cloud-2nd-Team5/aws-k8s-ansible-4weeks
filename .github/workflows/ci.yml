name: CI - Build & Push Docker Image # GitHub Actions 탭에 표시될 워크플로우 이름

on:
  push:
    branches: ["main"]   # main 브랜치에 코드가 push될 때 실행
    paths:
      - "app/**"         # app 폴더 안의 파일(소스코드, Dockerfile 등)이 변했을 때만 실행

concurrency:             # 동시에 여러 배포가 돌아갈 때 제어하는 설정
  group: ci-main         # ci-main이라는 그룹으로 묶어서 관리
  cancel-in-progress: false # 이전 작업이 진행 중이어도 취소하지 않고 대기함

jobs:
  build:
    runs-on: self-hosted # 내가 직접 띄운 서버(Bastion 등)에서 이 작업을 수행함

    env:
      DOCKER_IMAGE: "kimkiyeol/web-app" # 사용할 도커 이미지의 이름 

    steps:
      - name: Checkout code
        # GitHub 저장소에 있는 코드를 Runner 서버로 복사해옴
        uses: actions/checkout@v4

      - name: Install Docker
        # 서버에 도커가 설치되어 있는지 확인하고, 없으면 설치함
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          docker --version

      - name: Docker Login
        # 도커 허브에 이미지를 올리기 위해 로그인
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Image (SHA)
        # 이미지를 빌드하고 도커 허브로 전송(Push)함
        run: |
          # 고유한 커밋 ID(SHA)를 이미지 태그로 사용 (버전 관리 용도)
          IMAGE_TAG=${GITHUB_SHA} 
          
          # 1. 빌드: ./app 폴더의 Dockerfile을 읽어서 이미지 생성
          docker build -t ${DOCKER_IMAGE}:${IMAGE_TAG} ./app
          
          # 2. 전송: 생성된 이미지를 도커 허브 저장소로 업로드
          docker push ${DOCKER_IMAGE}:${IMAGE_TAG}