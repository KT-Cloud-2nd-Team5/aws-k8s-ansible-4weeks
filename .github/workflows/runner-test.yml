name: runner-test

on:
  push:
    branches:
      - main

jobs:
  test-runner:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print runner info
        run: |
          echo "Runner hostname:"
          hostname
          echo
          echo "Current user:"
          whoami
          echo
          echo "Working directory:"
          pwd
          echo
          echo "Disk usage:"
          df -h

      - name: Test basic commands
        run: |
          echo "Hello from self-hosted runner!"
          date
          uname -a
