plugin: aws_ec2
regions:
  - ap-northeast-2

filters:
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tag_Role
    prefix: ""
    separator: ""
  - key: tag_Type
    prefix: ""
    separator: ""

hostnames:
  - private-ip-address
  - dns-name

compose:
  ansible_host: private_ip_address