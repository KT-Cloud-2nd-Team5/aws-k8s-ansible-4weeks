plugin: aws_ec2
regions:
  - ap-northeast-2

filters:
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tags_Role
    prefix: ""
    separator: ""
  - key: tags_Type
    prefix: ""
    separator: ""

hostnames:
  - private-ip-address
  - dns-name

compose:
  ansible_host: private_ip_address
  ansible_user: ubuntu