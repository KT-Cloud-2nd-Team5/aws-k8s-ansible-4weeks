plugin: aws_ec2
regions:
  - ap-northeast-2

filters:
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: ""
    separator: ""
  - key: tags.Type
    prefix: ""
    separator: ""

hostnames:
  - tag:Name
  - private-ip-address

compose:
  ansible_host: private_ip_address
  ansible_user: ubuntu