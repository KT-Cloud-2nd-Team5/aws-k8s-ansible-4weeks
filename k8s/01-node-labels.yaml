# Node 리소스를 직접 패치하여 라벨을 부여
apiVersion: v1
kind: Node
metadata:
  # 실제 클러스터에 등록된 노드 이름 (kubectl get nodes 결과 기준)
  name: ip-10-0-1-90
  labels:
    # 이 노드는 웹 서버 역할을 수행
    node-role: web
---
apiVersion: v1
kind: Node
metadata:
  name: ip-10-0-1-144
  labels:
    node-role: web
---
apiVersion: v1
kind: Node
metadata:
  name: ip-10-0-2-222
  labels:
    # DB 전용 노드
    node-role: db
---
apiVersion: v1
kind: Node
metadata:
  name: ip-10-0-2-235
  labels:
    # 마스터 노드 역할 명시
    node-role: master

