---
# playbooks/cd.yml
#
# 이 플레이북은 “CD(배포)”만 담당합니다.
# - Docker build/push는 GitHub Actions가 수행
# - 이 플레이북은 master에서 kubectl을 실행하여
#   새 이미지를 적용하고 롤아웃이 성공했는지 검증합니다.

- name: CD - Update image & rollout on K3s master
  hosts: master
  become: true
  roles:
    # 실제 kubectl set image / rollout status 등은 role로 분리하여 재사용 가능하게 합니다.
    - role: k8s_deploy
