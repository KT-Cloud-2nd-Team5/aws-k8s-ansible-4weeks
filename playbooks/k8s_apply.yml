---
# playbooks/k8s_apply.yml
#
# 목적:
# - 레포 최상단의 k8s/ 폴더에 있는 매니페스트(YAML)들을
#   "마스터 노드"에서 한 번에 kubectl apply 하는 플레이북입니다.
#
# 왜 마스터에서 실행하나?
# - Kubernetes 리소스 생성/변경은 API 서버(= control-plane) 기준으로 한 번만 하면 되므로
#   hosts를 master로 한정하는 것이 안전합니다.
#
# 전제:
# - k3s 서버가 마스터에 설치되어 있어야 합니다.
# - /usr/local/bin/k3s 가 존재해야 합니다.

- name: Apply Kubernetes manifests (from repo k8s/ directory)
  hosts: master
  become: true

  vars:
    # k8s 폴더 경로:
    # playbook_dir = 현재 playbooks/ 디렉토리
    # ../k8s = 레포 루트의 k8s 폴더
    k8s_dir: "{{ playbook_dir }}/../k8s"

  tasks:
    - name: Check k3s binary exists on master
      stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Fail if k3s is not installed on master
      fail:
        msg: "k3s binary not found at /usr/local/bin/k3s. Install k3s server first."
      when: not k3s_bin.stat.exists

    - name: Apply all manifests under k8s/ directory
      shell: |
        set -eu
        echo "[INFO] Applying manifests from: {{ k8s_dir }}"
        /usr/local/bin/k3s kubectl apply -f "{{ k8s_dir }}"
      args:
        executable: /bin/bash

    - name: Verify resources after apply (deploy/svc/pods)
      shell: |
        set -eu
        echo "=== Deployments (default) ==="
        /usr/local/bin/k3s kubectl get deploy -n default
        echo "=== Services (default) ==="
        /usr/local/bin/k3s kubectl get svc -n default
        echo "=== Pods (default) ==="
        /usr/local/bin/k3s kubectl get pods -n default -o wide
      args:
        executable: /bin/bash
      changed_when: false
