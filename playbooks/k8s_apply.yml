---
# playbooks/k8s_apply.yml
- name: Apply Kubernetes manifests (from repo k8s/ directory)
  hosts: master
  become: true

  vars:
    # [수정 1] 경로를 로컬(Runner)과 리모트(Master)로 분리합니다.
    local_k8s_dir: "{{ playbook_dir }}/../k8s"
    remote_k8s_dir: "/tmp/k8s-manifests"

  tasks:
    - name: Check k3s binary exists on master
      stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Fail if k3s is not installed on master
      fail:
        msg: "k3s binary not found at /usr/local/bin/k3s. Install k3s server first."
      when: not k3s_bin.stat.exists

    # [수정 2] Runner의 k8s 폴더 내용을 Master 노드로 복사하는 단계 추가
    - name: Copy k8s manifests from Runner to Master node
      copy:
        src: "{{ local_k8s_dir }}/"  # 뒤에 /를 붙여야 폴더 안의 내용물이 복사됨
        dest: "{{ remote_k8s_dir }}/"
        mode: '0644'
        directory_mode: '0755'

    # [수정 3] 복사된 원격 경로(remote_k8s_dir)를 사용하여 kubectl apply 실행
    - name: Apply all manifests under remote directory
      shell: |
        set -eu
        echo "[INFO] Applying manifests from: {{ remote_k8s_dir }}"
        /usr/local/bin/k3s kubectl apply -f "{{ remote_k8s_dir }}"
      args:
        executable: /bin/bash

    - name: Verify resources after apply (deploy/svc/pods)
      shell: |
        set -eu
        echo "=== Deployments (default) ==="
        /usr/local/bin/k3s kubectl get deploy -n default
        echo "=== Services (default) ==="
        /usr/local/bin/k3s kubectl get svc -n default
        echo "=== Pods (default) ==="
        /usr/local/bin/k3s kubectl get pods -n default -o wide
      args:
        executable: /bin/bash
      changed_when: false