---
# 1. 모니터링 서버 IP를 미리 계산
- name: 변수 초기화
  hosts: all
  tasks:
    - name: 중앙 서버 IP 고정
      set_fact:
        target_central_ip: "{{ hostvars[groups['monitoring_server'][0]]['ansible_host'] | default(groups['monitoring_server'][0]) }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true

# 2. 중앙 서버 구축
- name: 중앙 모니터링 서버 구축
  hosts: monitoring_server
  vars_files:
    - "../group_vars/all.yml"
    - "../group_vars/monitoring_server.yml"
  roles:
    - docker
    - monitoring_stack

# 3. 타겟 서버들 공통 설정
- name: 쿠버네티스 에이전트 배포
  environment: "{{ proxy_env }}"
  hosts: master
  become: true
  roles:
    - role: prometheus_agent
