---
# 1. IP 계산 (기존 동일)
- name: 변수 초기화
  hosts: all
  tasks:
    - name: 중앙 서버 IP 고정
      set_fact:
        target_central_ip: "{{ hostvars[groups['monitoring_server'][0]]['ansible_host'] | default(groups['monitoring_server'][0]) }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: false

# 2. 중앙 서버 구축 (Docker 기반)
- name: 중앙 모니터링 서버 구축
  hosts: monitoring_server
  vars_files:
    - "../group_vars/monitoring_server.yml"
  roles:
    - docker
    - monitoring_stack

# 3. [핵심] 마스터에서 헬름을 통해 클러스터 전체에 에이전트 배포
- name: K3s 클러스터 모니터링 에이전트 배포
  hosts: master  # 이제 여기서만 헬름이 실행됩니다.
  become: true
  vars_files:
    - "../group_vars/master.yml"
  vars:
    my_ns: "monitoring"
  roles:
    - role: prometheus_agent  # 이 안에 있는 '헬름 설치 코드'가 마스터에만 적용됩니다.
      central_prometheus_ip: "{{ hostvars['localhost']['target_central_ip'] | default(target_central_ip) }}"

# 4. K8s 외부/개별 설정 (필요한 경우에만)
- name: DB 서버 전용 설정
  hosts: db
  become: true
  vars_files:
    - "../group_vars/db.yml"
  roles:
    # 에이전트는 이미 마스터가 깔아줬으니, 여기서는 DB 전용 엑스포터만 처리!
    - { role: mysql_exporter, when: "'db' in group_names" }
    # - { role: nginx_exporter, when: "'web' in group_names" }
