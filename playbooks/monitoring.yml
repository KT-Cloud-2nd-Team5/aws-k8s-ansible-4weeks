---
# 1. 모니터링 서버 IP를 미리 계산 (전역 변수화)
- name: 변수 초기화
  hosts: all
  tasks:
    - name: 중앙 서버 IP 고정
      set_fact:
        target_central_ip: "{{ hostvars[groups['monitoring_server'][0]]['ansible_host'] | default(groups['monitoring_server'][0]) }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: false

# 2. 중앙 서버 구축 (Docker)
- name: 중앙 모니터링 서버 구축
  hosts: monitoring_server
  vars_files:
    - "../group_vars/monitoring_server.yml"
  roles:
    - docker
    - monitoring_stack

# 3. 타겟 서버들 공통 설정
- name: 타겟 서버 모니터링 설정
  hosts: db, web 
  become: true
  # db.yml, master.yml 
  vars_files:
    - "../group_vars/db.yml"
  vars:
    my_ns: "monitoring"
  roles:
    - role: prometheus_agent
      central_prometheus_ip: "{{ hostvars['localhost']['target_central_ip'] if hostvars['localhost']['target_central_ip'] is defined else target_central_ip }}"
    
    - { role: mysql_exporter, when: "'db' in group_names" }
    # - { role: nginx_exporter, when: "'web' in group_names" }
