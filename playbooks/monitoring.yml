---
# 1. 모니터링 서버 IP를 미리 계산 (전역 변수화)
- name: 변수 초기화
  hosts: all
  tasks:
    - name: 중앙 서버 IP 고정
      set_fact:
        target_central_ip: "{{ hostvars[groups['monitoring_server'][0]]['ansible_host'] | default(groups['monitoring_server'][0]) }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true  # localhost에 fact를 저장하여 다른 play에서 참조 가능하게 함

# 2. 중앙 서버 구축 (Docker)
- name: 중앙 모니터링 서버 구축
  hosts: monitoring_server
  vars_files:
    - "../group_vars/all.yml"  # [추가] 프록시 등 공통 변수 로드
    - "../group_vars/monitoring_server.yml"
  roles:
    - docker
    - monitoring_stack

# 3. 타겟 서버들 공통 설정 (DB, Nginx 통합)
- name: 타겟 서버 모니터링 설정
  hosts: db, web
  become: true
  vars_files:
    - "../group_vars/all.yml"  # [추가] 프록시 등 공통 변수 로드
    - "../group_vars/db.yml"
  vars:
    my_ns: "monitoring"
  roles:
    - role: prometheus_agent
      # 변수 초기화 play에서 delegate_facts: true를 했으므로 아래와 같이 참조 가능
      central_prometheus_ip: "{{ hostvars['localhost']['target_central_ip'] }}"
    
    # 인벤토리 그룹명(db)에 맞춰 조건부 실행
    - { role: mysql_exporter, when: "'db' in group_names" }
