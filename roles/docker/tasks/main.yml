# roles/docker/tasks/main.yml
---
- name: 도커 설치를 위한 필수 패키지 설치
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: 도커 GPG 키 저장을 위한 디렉토리 생성
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: 도커 공식 GPG 키 다운로드 및 저장
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: 도커 공식 리포지토리 추가
  apt_repository:
    repo: >
      deb [arch={{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker

- name: 도커 엔진 및 컴포즈 플러그인 설치
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
    
- name: docker 그룹 존재 확인 및 생성
  become: yes
  group:
    name: docker
    state: present

- name: 도커 서비스 시작 및 부팅 시 자동 실행 설정
  service:
    name: docker
    state: started
    enabled: yes

- name: 현재 사용자를 docker 그룹에 추가 (권한 설정)
  user:
    name: "{{ target_user }}"
    groups: docker
    append: yes
