---
# roles/k3s_master/tasks/main.yml

- name: Install K3s server on master (always write log to /tmp)
  become: true
  environment:
    http_proxy: "{{ http_proxy | default(omit) }}"
    https_proxy: "{{ https_proxy | default(omit) }}"
    no_proxy: "{{ no_proxy | default(omit) }}"
  shell: |
    set -eu

    # 로그 파일은 무조건 먼저 만든다(빈 파일이라도 생성)
    : > /tmp/k3s-install.log

    # 설치 스크립트 다운로드/권한
    curl -sfL https://get.k3s.io -o /tmp/k3s_install.sh >> /tmp/k3s-install.log 2>&1
    chmod +x /tmp/k3s_install.sh >> /tmp/k3s-install.log 2>&1

    # 설치 실행(실패해도 rc를 저장)
    set +e
    INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644" /tmp/k3s_install.sh >> /tmp/k3s-install.log 2>&1
    rc=$?
    set -e

    echo "K3S_INSTALL_RC=${rc}" >> /tmp/k3s-install.log
    exit $rc
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  register: k3s_install
  ignore_errors: true

- name: Show K3s install log (master) when failed
  become: true
  shell: |
    echo "===== k3s_install.rc={{ k3s_install.rc | default('N/A') }} ====="
    echo "===== /tmp/k3s-install.log (tail 200) ====="
    tail -n 200 /tmp/k3s-install.log || true
  args:
    executable: /bin/bash
  changed_when: false
  when: k3s_install is failed

- name: Fail if K3s install failed
  fail:
    msg: "K3s server install failed on master. See /tmp/k3s-install.log output above."
  when: k3s_install is failed

- name: Wait until node-token exists
  become: true
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 180

- name: Read join token from master
  become: true
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: token_raw
  retries: 10
  delay: 3
  until: token_raw is succeeded

- name: Store token as fact (master)
  set_fact:
    k3s_token: "{{ token_raw.content | b64decode | trim }}"

- name: Wait for Kubernetes API ready
  become: true
  shell: |
    set -e
    for i in {1..40}; do
      /usr/local/bin/k3s kubectl get nodes >/dev/null 2>&1 && exit 0
      sleep 3
    done
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
