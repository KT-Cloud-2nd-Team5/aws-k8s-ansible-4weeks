- name: Install K3s server on master
  become: true
  shell: |
    curl -sfL https://get.k3s.io | sh -s - server --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s

- name: Read join token from master
  become: true
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: token_raw

- name: Store token as fact (master)
  set_fact:
    k3s_token: "{{ token_raw.content | b64decode | trim }}"

- name: Wait for Kubernetes API ready
  become: true
  shell: |
    set -e
    for i in {1..40}; do
      /usr/local/bin/k3s kubectl get nodes >/dev/null 2>&1 && exit 0
      sleep 3
    done
    exit 1