- name: Install K3s server on master (with log)
  become: true
  environment:
    http_proxy: "{{ http_proxy | default(omit) }}"
    https_proxy: "{{ https_proxy | default(omit) }}"
    no_proxy: "{{ no_proxy | default(omit) }}"
  shell: |
    set -euo pipefail
    curl -sfL https://get.k3s.io -o /tmp/k3s_install.sh
    chmod +x /tmp/k3s_install.sh
    INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644" /tmp/k3s_install.sh 2>&1 | tee /var/log/k3s-install.log
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s

- name: Show K3s install log (master)
  become: true
  shell: |
    tail -n 200 /var/log/k3s-install.log || true
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  
- name: Wait until node-token exists
  become: true
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 180

- name: Read join token from master
  become: true
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: token_raw
  retries: 10
  delay: 3
  until: token_raw is succeeded

- name: Store token as fact (master)
  set_fact:
    k3s_token: "{{ token_raw.content | b64decode | trim }}"

- name: Wait for Kubernetes API ready
  become: true
  shell: |
    set -e
    for i in {1..40}; do
      /usr/local/bin/k3s kubectl get nodes >/dev/null 2>&1 && exit 0
      sleep 3
    done
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
