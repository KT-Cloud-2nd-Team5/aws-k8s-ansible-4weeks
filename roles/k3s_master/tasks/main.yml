---
# roles/k3s_master/tasks/main.yml

- name: Install K3s server on master (optimized proxy)
  become: true
  shell: |
    set -eu

    # IPv4 강제 및 프록시를 통한 설치 스크립트 다운로드
    curl -4 --proxy "{{ proxy_url }}" -fL https://get.k3s.io -o /tmp/k3s_install.sh
    chmod +x /tmp/k3s_install.sh

    # K3s 서버 설치 실행
    INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644" /tmp/k3s_install.sh
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s

- name: Wait until node-token exists
  become: true
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 180

- name: Read join token from master
  become: true
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: token_raw
  retries: 10
  delay: 3
  until: token_raw is succeeded

- name: Store token as fact (master)
  set_fact:
    k3s_token: "{{ token_raw.content | b64decode | trim }}"

- name: Wait for Kubernetes API ready
  become: true
  shell: |
    set -e
    for i in {1..40}; do
      /usr/local/bin/k3s kubectl get nodes >/dev/null 2>&1 && exit 0
      sleep 3
    done
    exit 1
  args:
    executable: /bin/bash
  changed_when: false

