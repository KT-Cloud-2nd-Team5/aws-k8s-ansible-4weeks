---
# roles/k3s_worker/tasks/main.yml

- name: Install K3s agent and join cluster (proxy forced only when needed)
  become: true
  shell: |
    set -eu

    # group_vars/db.yml 에 proxy_url이 있으면 db만 프록시 사용, web은 미사용
    PROXY="{{ proxy_url | default('') }}"
    NO_PROXY_LIST="127.0.0.1,localhost,10.0.0.0/16,{{ hostvars[groups['master'][0]].ansible_host }},.svc,.cluster.local"

    if [ -n "${PROXY}" ]; then
      export http_proxy="${PROXY}"
      export https_proxy="${PROXY}"
      export HTTP_PROXY="${PROXY}"
      export HTTPS_PROXY="${PROXY}"
      export no_proxy="${NO_PROXY_LIST}"
      export NO_PROXY="${NO_PROXY_LIST}"
      CURL_PROXY_OPT="--proxy ${PROXY} -4"
    else
      CURL_PROXY_OPT=""
    fi

    # 설치 스크립트 다운로드 (db면 proxy+ipv4 강제, web이면 직통)
    curl ${CURL_PROXY_OPT} -fL https://get.k3s.io -o /tmp/k3s_install.sh
    chmod +x /tmp/k3s_install.sh

    # 조인
    K3S_URL="https://{{ hostvars[groups['master'][0]].ansible_host }}:6443" \
    K3S_TOKEN="{{ hostvars[groups['master'][0]].k3s_token }}" \
    INSTALL_K3S_EXEC="agent" \
      /tmp/k3s_install.sh
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s-agent
