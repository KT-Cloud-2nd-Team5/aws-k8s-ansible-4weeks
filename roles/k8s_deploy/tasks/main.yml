# roles/k8s_deploy/tasks/main.yml
---
- name: Check k3s binary exists on master
  become: true
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Fail if k3s is not installed on master
  fail:
    msg: "k3s binary not found. Install k3s server first."
  when: not k3s_bin.stat.exists

# 1) 현재 상태 확인
- name: Show current deployment image (before)
  become: true
  shell: |
    set -eu
    /usr/local/bin/k3s kubectl -n {{ namespace }} get deploy {{ deployment }} -o jsonpath='{.spec.template.spec.containers[?(@.name=="{{ container }}")].image}{"\n"}'
  args:
    executable: /bin/bash
  changed_when: false
  ignore_errors: true  # 처음 배포라 없을 수도 있으니 에러 무시

# 2) 강제 재시작 (Rollout Restart)
# imagePullPolicy: Always가 설정되어 있어도, YAML 파일 내용이 안 바뀌면
# 쿠버네티스가 재배포를 안 합니다. 그래서 "강제로 껐다 켜라"고 명령해야
# latest 이미지를 새로 받아옵니다.
- name: Rollout restart deployment to pull new image
  become: true
  command: "/usr/local/bin/k3s kubectl -n {{ namespace }} rollout restart deployment/{{ deployment }}"

# 3) 롤아웃 완료 대기
- name: Wait for rollout to finish
  become: true
  command: "/usr/local/bin/k3s kubectl -n {{ namespace }} rollout status deployment/{{ deployment }} --timeout=180s"

# 4) 결과 검증
- name: Show deployment image (after)
  become: true
  shell: |
    set -eu
    echo "=== Deployment image (after) ==="
    /usr/local/bin/k3s kubectl -n {{ namespace }} get deploy {{ deployment }} -o jsonpath='{.spec.template.spec.containers[?(@.name=="{{ container }}")].image}{"\n"}'
    echo "=== Pods ==="
    /usr/local/bin/k3s kubectl -n {{ namespace }} get pods -o wide
  args:
    executable: /bin/bash
  changed_when: false
