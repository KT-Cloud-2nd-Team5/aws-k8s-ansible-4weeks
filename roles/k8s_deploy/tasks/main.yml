---
# roles/k8s_deploy/tasks/main.yml
#
# 이 role은 “쿠버네티스 배포”만 담당합니다.
# - k3s 환경이라 kubectl 대신 "k3s kubectl"을 쓰는 것이 가장 안전합니다.
# - (이유) PATH 문제나 kubeconfig 경로 문제로 kubectl이 실패하는 경우가 많기 때문입니다.

- name: Check k3s binary exists on master
  become: true
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Fail if k3s is not installed on master
  fail:
    msg: "k3s binary not found at /usr/local/bin/k3s. Install k3s server first."
  when: not k3s_bin.stat.exists

# -----------------------------
# 1) 현재 Deployment 상태 확인(배포 전)
# -----------------------------
- name: Show current deployment image (before)
  become: true
  shell: |
    set -eu
    /usr/local/bin/k3s kubectl -n {{ namespace }} get deploy {{ deployment }} -o jsonpath='{.spec.template.spec.containers[?(@.name=="{{ container }}")].image}{"\n"}'
  args:
    executable: /bin/bash
  changed_when: false

# -----------------------------
# 2) 이미지 교체 (핵심)
# -----------------------------
# kubectl set image는 “매니페스트 파일을 수정하지 않고도”
# Deployment의 특정 컨테이너 이미지를 즉시 교체할 수 있는 가장 단순한 배포 방식입니다.
- name: Update image of deployment container
  become: true
  shell: |
    set -eu
    /usr/local/bin/k3s kubectl -n {{ namespace }} set image deployment/{{ deployment }} {{ container }}={{ image_full }} --record
  args:
    executable: /bin/bash

# -----------------------------
# 3) 롤아웃 완료 대기
# -----------------------------
# 새 이미지 pull + 새 파드 기동이 성공할 때까지 대기합니다.
# 실패하면 여기서 바로 실패하므로 CD 파이프라인이 “빨간색”으로 끝나게 됩니다.
- name: Wait for rollout to finish
  become: true
  shell: |
    set -eu
    /usr/local/bin/k3s kubectl -n {{ namespace }} rollout status deployment/{{ deployment }} --timeout=180s
  args:
    executable: /bin/bash
  changed_when: false

# -----------------------------
# 4) 결과 검증 출력(배포 후)
# -----------------------------
- name: Show deployment image (after)
  become: true
  shell: |
    set -eu
    echo "=== Deployment image (after) ==="
    /usr/local/bin/k3s kubectl -n {{ namespace }} get deploy {{ deployment }} -o jsonpath='{.spec.template.spec.containers[?(@.name=="{{ container }}")].image}{"\n"}'
    echo "=== Pods ==="
    /usr/local/bin/k3s kubectl -n {{ namespace }} get pods -o wide
  args:
    executable: /bin/bash
  changed_when: false
