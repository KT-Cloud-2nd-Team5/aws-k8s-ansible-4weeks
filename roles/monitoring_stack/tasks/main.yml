---
# 1. 기존 데이터 정리 (충돌 방지)
- name: 기존 설정 폴더 및 파일 초기화
  become: true
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ monitoring_dir }}/provisioning"
    - "{{ monitoring_dir }}/prometheus.yml"

# 2. 필요한 모든 '디렉토리' 생성
- name: 모니터링 디렉토리 구조 생성
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
    mode: "0755"
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_dir }}/provisioning/datasources"
    - "{{ monitoring_dir }}/provisioning/dashboards"
    - "{{ monitoring_dir }}/provisioning/alerting"
    - "{{ monitoring_dir }}/dashboards"

# 3. 설정 파일 배포
- name: 모니터링 설정 파일 배포
  become: true
  template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_dir }}/{{ item.dest }}"
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
    mode: "0644"
    force: true
  loop:
    - { src: "docker-compose.yml.j2", dest: "docker-compose.yml" }
    - { src: "prometheus.yml.j2", dest: "prometheus.yml" }
    - {
        src: "datasource.yml.j2",
        dest: "provisioning/datasources/datasource.yml",
      }
    - {
        src: "dashboards-provider.yml.j2",
        dest: "provisioning/dashboards/provider.yml",
      }
    - { src: "alerting.yml.j2", dest: "provisioning/alerting/alerting.yml" }
  notify: "reload monitoring"

# 4. Grafana Labs에서 공식 대시보드 다운로드
- name: Grafana Labs에서 공식 대시보드 다운로드
  become: true
  get_url:
    url: "https://grafana.com/api/dashboards/{{ item.id }}/revisions/{{ item.revision }}/download"
    dest: "{{ monitoring_dir }}/dashboards/dashboard-{{ item.id }}.json"
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
  loop: "{{ dashboard_ids | default([]) }}"
  when: dashboard_ids is defined

# 5. 통합 모니터링 스택 실행
- name: 통합 모니터링 스택 실행
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present
    remove_orphans: true
