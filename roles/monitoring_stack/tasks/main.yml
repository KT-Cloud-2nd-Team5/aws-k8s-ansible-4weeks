---
# 1. 기존 데이터 완전 정리 (DB 캐시까지!)
- name: 기존 설정 폴더 및 파일 초기화
  become: true
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ monitoring_dir }}/provisioning"
    - "{{ monitoring_dir }}/dashboards"
    - "{{ monitoring_dir }}/data"
    - "{{ monitoring_dir }}/grafana-data"
    - "{{ monitoring_dir }}/grafana-data/grafana.db"
    - "{{ monitoring_dir }}/prometheus.yml"

# 2. 필요한 모든 디렉토리 생성
- name: 모니터링 디렉토리 구조 생성
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
    mode: "0755"
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_dir }}/provisioning/datasources"
    - "{{ monitoring_dir }}/provisioning/dashboards"
    - "{{ monitoring_dir }}/provisioning/alerting"
    - "{{ monitoring_dir }}/dashboards"
    - "{{ monitoring_dir }}/grafana-data"

# 3. 설정 파일 배포 (전체!)
- name: 모니터링 설정 파일 배포
  become: true
  template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_dir }}/{{ item.dest }}"
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
    mode: "0644"
    force: true
  loop:
    - { src: "docker-compose.yml.j2", dest: "docker-compose.yml" }
    - { src: "prometheus.yml.j2", dest: "prometheus.yml" }
    - {
        src: "datasource.yml.j2",
        dest: "provisioning/datasources/datasource.yml",
      }
    - {
        src: "dashboards-provider.yml.j2",
        dest: "provisioning/dashboards/provider.yml",
      }
    - { src: "alerting.yml.j2", dest: "provisioning/alerting/alerting.yml" }
  notify: "reload monitoring"

# 4. Grafana Labs 공식 대시보드 다운로드
- name: Grafana Labs에서 공식 대시보드 다운로드
  become: true
  get_url:
    url: "https://grafana.com/api/dashboards/{{ item.id }}/revisions/{{ item.revision }}/download"
    dest: "{{ monitoring_dir }}/dashboards/dashboard-{{ item.id }}.json"
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
  loop: "{{ dashboard_ids | default([]) }}"
  when: dashboard_ids is defined

- name: 대시보드 JSON 내 DS_PROMETHEUS 치환
  become: true
  replace:
    path: "{{ monitoring_dir }}/dashboards/dashboard-{{ item.id }}.json"
    regexp: '\$\{DS_PROMETHEUS\}'
    replace: "Prometheus"
  loop: "{{ dashboard_ids | default([]) }}"
  when: dashboard_ids is defined

# 5. 커스텀 대시보드 배포
- name: Deploy custom dashboard
  become: true
  copy:
    src: files/custom-dashboard.json
    dest: "{{ monitoring_dir }}/dashboards/Custom_Dashboard.json"
    owner: "{{ target_user | default('ubuntu') }}"
    group: "{{ target_user | default('ubuntu') }}"
  notify: "reload monitoring"

# 6. Docker Compose 완전 재생성 (핵심!)
- name: 기존 모니터링 스택 완전 중지
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: absent
    remove_orphans: true

- name: 통합 모니터링 스택 완전 재생성
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present
    remove_orphans: true
    recreate: always
    pull: always

# 7. Grafana 안정화 대기 (handlers 밖으로!)
- name: Grafana 서비스 안정화 대기 (30초)
  pause:
    seconds: 30

  handlers:
    - name: reload monitoring
      become: true
      community.docker.docker_compose_v2:
        project_src: "{{ monitoring_dir }}"
        state: restarted
        recreate: always
