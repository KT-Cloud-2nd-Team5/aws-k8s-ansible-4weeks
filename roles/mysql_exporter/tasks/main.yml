# 1. 필수 라이브러리 설치
- name: 필수 OS 패키지 및 Python 라이브러리 설치
  become: true
  apt:
    name:
      - python3-kubernetes
      - python3-yaml
    state: present
  register: apt_res
  until: apt_res is success
  retries: 5
  delay: 10

# 2. ServiceMonitor CRD 보장 (중요: 이 작업이 없으면 에러 발생)
- name: Ensure ServiceMonitor CRD exists
  become: true
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml"

# 3. MySQL Exporter 배포
- name: Deploy MySQL Exporter via Helm
  become: true
  kubernetes.core.helm:
    name: "{{ release_name }}"
    chart_ref: prometheus-community/prometheus-mysql-exporter
    release_namespace: "{{ my_ns }}"
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    values:
      mysql:
        user: "{{ mysql_user }}"
        pass: "{{ mysql_password }}"
        host: "{{ mysql_host }}" # 현재는 "mysql.default.svc" 사용 중
        port: "{{ mysql_port | default(3306) }}"

      service:
        type: ClusterIP
        port: 9104

      serviceMonitor:
        enabled: true
        # [핵심 수정] job 이름을 'kubernetes-pods' 대신 서비스 이름으로 고정합니다.
        # 대부분의 그라파나 템플릿은 이 설정이 있어야 데이터를 인식합니다.
        jobLabel: "app.kubernetes.io/name"
        additionalLabels:
          # 현재 프로메테우스 에이전트가 탐색할 수 있는 라벨
          release: "prometheus-agent"
        interval: 30s
        scrapeTimeout: 10s
        # 필요시 릴리스 이름이 다를 경우를 대비해 명시적 경로 지정
        telemetryPath: /metrics
