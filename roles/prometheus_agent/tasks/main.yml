---
# 1. Helm 설치 여부 확인
- name: Helm 설치 여부 확인
  command: helm version
  register: helm_check
  ignore_errors: true
  changed_when: false

# 2. Helm 직접 설치 (프록시 적용)
- name: Helm 설치 (Proxy 활용)
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  when: helm_check.failed

# [핵심 변경] 3. APT 대신 curl로 pip 설치 스크립트 다운로드
- name: (우회) pip 수동 설치 스크립트 다운로드
  become: true
  get_url:
    url: https://bootstrap.pypa.io/get-pip.py
    dest: /tmp/get-pip.py
    validate_certs: no
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# [핵심 변경] 4. 스크립트로 pip 설치 (APT 의존성 제거)
- name: (우회) pip 설치 실행
  become: true
  shell: python3 /tmp/get-pip.py
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# [핵심 변경] 5. 라이브러리 설치 (방금 설치한 pip 사용)
- name: (우회) kubernetes 라이브러리 설치
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    /usr/local/bin/pip3 install kubernetes
  args:
    executable: /bin/bash

# 6. Helm 저장소 추가
- name: Prometheus Community 저장소 추가
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 7. 에이전트 배포 (이전과 동일)
- name: Prometheus Agent 배포
  become: true
  kubernetes.core.helm:
    name: prometheus-agent
    chart_ref: prometheus-community/prometheus
    release_namespace: "{{ my_ns | default('monitoring') }}"
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    values:
      # 최신 헬름 차트에서 에이전트 모드를 활성화하는 통합 스위치
      deploymentMode: agent

      server:
        enabled: true
        # 저장소 사용 안 함 (노드 어피니티/PVC 부족으로 인한 Pending 해결)
        persistentVolume:
          enabled: false

        # 수동 nc/curl 테스트로 검증된 목적지 설정
        remoteWrite:
          - url: "http://{{ proxy_server_ip }}:9090/api/v1/write"

        # 프로메테우스 바이너리 레벨에서 에이전트 전용 기능 활성화
        extraArgs:
          enable-feature: agent

      # 중앙 모니터링 서버가 있으므로 에이전트 측은 비활성화
      alertmanager:
        enabled: false
      pushgateway:
        enabled: false

      # 로컬 저장을 하지 않으므로 보존 기간을 최소화 (메모리 절약)
      retention: 1h

  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"
