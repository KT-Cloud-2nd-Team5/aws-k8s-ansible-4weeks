---
# 1. Helm 설치 여부 확인
- name: Helm 설치 여부 확인
  command: helm version
  register: helm_check
  ignore_errors: true
  changed_when: false

# 2. Helm 직접 설치 (프록시 적용)
- name: Helm 설치 (Proxy 활용)
  become: true
  shell: |
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  when: helm_check.failed

# 3. APT 대신 curl로 pip 설치 스크립트 다운로드
- name: (우회) pip 수동 설치 스크립트 다운로드
  become: true
  get_url:
    url: https://bootstrap.pypa.io/get-pip.py
    dest: /tmp/get-pip.py
    validate_certs: no

# 4. 스크립트로 pip 설치 (APT 의존성 제거)
- name: (우회) pip 설치 실행
  become: true
  shell: python3 /tmp/get-pip.py

# 5. 라이브러리 설치 (방금 설치한 pip 사용)
- name: (우회) kubernetes 라이브러리 설치
  become: true
  shell: |
    /usr/local/bin/pip3 install kubernetes
  args:
    executable: /bin/bash

# 6. Helm 저장소 추가
- name: Prometheus Community 저장소 추가
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"

# 7 쿠버네티스 노드에 별칭(Alias) 라벨 부여
- name: K3s 노드에 관리용 별칭 라벨 추가 (Shell 사용)
  become: true
  shell: |
    # kubectl 명령어로 직접 라벨링 (이미 있으면 덮어쓰기)
    kubectl label node {{ ansible_hostname }} alias={{ inventory_hostname }} --overwrite
  delegate_to: "{{ groups['master'][0] }}"

# 8. 에이전트 배포
- name: Prometheus Agent 배포
  become: true
  kubernetes.core.helm:
    name: prometheus-agent
    chart_ref: prometheus-community/prometheus
    release_namespace: "{{ my_ns | default('monitoring') }}"
    create_namespace: true
    # [중요] 마스터 노드에 있는 k3s.yaml을 참조합니다.
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    values:
      deploymentMode: agent

      global:
        external_labels:
          agent_host: "{{ inventory_hostname }}"

      server:
        enabled: true
        retention: "" 
        persistentVolume:
          enabled: false

        remoteWrite:
          - url: "http://{{ proxy_server_ip }}:9090/api/v1/write"
            write_relabel_configs:
              - source_labels: [__meta_kubernetes_node_label_alias]
                target_label: nodename
                action: replace
                regex: "(.+)"
              - source_labels: [nodename]
                regex: "^$"
                replacement: "none"
              - source_labels: [nodename, node]
                regex: "none;(.+)"
                target_label: nodename
                replacement: "$1"
                action: replace
              - source_labels: [__meta_kubernetes_node_label_node_role]
                target_label: role
                action: replace

        extraArgs:
          enable-feature: agent

      alertmanager:
        enabled: false
      pushgateway:
        enabled: false

      kube-state-metrics:
        metricLabelsAllowlist:
          - nodes=[alias,node-role]

  # 워커 노드는 건너뛰고 오직 'master' 노드에서만 Helm을 실행합니다!
  when: inventory_hostname in groups['master']