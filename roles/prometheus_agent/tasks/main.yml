---
# 1. Helm 설치 여부 확인
- name: Helm 설치 여부 확인
  command: helm version
  register: helm_check
  ignore_errors: true
  changed_when: false

# 2. Helm 직접 설치 (프록시 적용)
- name: Helm 설치 (Proxy 활용)
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  when: helm_check.failed

# 3. APT 대신 curl로 pip 설치 스크립트 다운로드
- name: (우회) pip 수동 설치 스크립트 다운로드
  become: true
  get_url:
    url: https://bootstrap.pypa.io/get-pip.py
    dest: /tmp/get-pip.py
    validate_certs: no
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 4. 스크립트로 pip 설치 (APT 의존성 제거)
- name: (우회) pip 설치 실행
  become: true
  shell: python3 /tmp/get-pip.py
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 5. 라이브러리 설치 (방금 설치한 pip 사용)
- name: (우회) kubernetes 라이브러리 설치
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    /usr/local/bin/pip3 install kubernetes
  args:
    executable: /bin/bash

# 6. Helm 저장소 추가
- name: Prometheus Community 저장소 추가
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 7. 에이전트 배포
- name: Prometheus Agent 배포
  become: true
  kubernetes.core.helm:
    name: prometheus-agent
    chart_ref: prometheus-community/prometheus
    release_namespace: "{{ my_ns | default('monitoring') }}"
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    values:
      deploymentMode: agent
      extraScrapeConfigs: |
        - job_name: 'kubernetes-pods'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_job]
              action: replace
              target_label: job
              regex: (.+)
      server:
        remoteWrite:
          - url: "http://{{ proxy_url }}:9090/api/v1/write"

  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"
