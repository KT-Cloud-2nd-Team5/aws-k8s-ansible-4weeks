---
# 1. Helm 설치 여부 확인
- name: Helm 설치 여부 확인
  command: helm version
  register: helm_check
  ignore_errors: true
  changed_when: false

# 2. Helm 직접 설치 (프록시 적용)
- name: Helm 설치 (Proxy 활용)
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  when: helm_check.failed

# 3. APT 대신 curl로 pip 설치 스크립트 다운로드
- name: (우회) pip 수동 설치 스크립트 다운로드
  become: true
  get_url:
    url: https://bootstrap.pypa.io/get-pip.py
    dest: /tmp/get-pip.py
    validate_certs: no
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 4. 스크립트로 pip 설치 (APT 의존성 제거)
- name: (우회) pip 설치 실행
  become: true
  shell: python3 /tmp/get-pip.py
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 5. 라이브러리 설치 (방금 설치한 pip 사용)
- name: (우회) kubernetes 라이브러리 설치
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    /usr/local/bin/pip3 install kubernetes
  args:
    executable: /bin/bash

# 6. Helm 저장소 추가
- name: Prometheus Community 저장소 추가
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 7 쿠버네티스 노드에 별칭(Alias) 라벨 부여
- name: K3s 노드에 관리용 별칭 라벨 추가 (Shell 사용)
  become: true
  shell: |
    # kubectl 명령어로 직접 라벨링 (이미 있으면 덮어쓰기)
    kubectl label node {{ ansible_hostname }} alias={{ inventory_hostname }} --overwrite
  delegate_to: "{{ groups['master'][0] }}"
  environment:
    # 마스터 노드 내부 통신이므로 프록시를 완전히 무력화
    http_proxy: ""
    https_proxy: ""
    no_proxy: "*"

# 8. 에이전트 배포
- name: Prometheus Agent 배포
  become: true
  kubernetes.core.helm:
    name: prometheus-agent
    chart_ref: prometheus-community/prometheus
    release_namespace: "{{ my_ns | default('monitoring') }}"
    create_namespace: true
    # [중요] 마스터 노드에 있는 k3s.yaml을 참조합니다.
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    values:
      deploymentMode: agent

      # 1. 전역 라벨 설정 (에이전트 자체 식별용)
      global:
        external_labels:
          agent_host: "{{ inventory_hostname }}"

      server:
        enabled: true
        persistentVolume:
          enabled: false

        # [핵심] 리모트 라이트 시 노드 라벨(alias)을 nodename으로 변환
        remoteWrite:
          - url: "http://{{ proxy_server_ip }}:9090/api/v1/write"
            write_relabel_configs:
              # 단계 1: 노드에 붙인 'alias' 라벨이 있으면 'nodename' 라벨로 교체
              - source_labels: [__meta_kubernetes_node_label_alias]
                target_label: nodename
                action: replace
                regex: "(.+)"

              # 단계 2: 'alias'가 없는 경우를 대비해 기존 'node'명(ip-10-...)을 nodename으로 백업
              - source_labels: [nodename]
                regex: "^$"
                replacement: "none"
              - source_labels: [nodename, node]
                regex: "none;(.+)"
                target_label: nodename
                replacement: "$1"
                action: replace

              # 단계 3: 노드 역할(web/db) 라벨 주입
              - source_labels: [__meta_kubernetes_node_label_node_role]
                target_label: role
                action: replace

        extraArgs:
          enable-feature: agent

      # 에이전트 모드이므로 불필요한 기능은 끕니다.
      alertmanager:
        enabled: false
      pushgateway:
        enabled: false

      retention: 1h

      # [핵심] 노드 라벨을 메트릭으로 노출시켜 에이전트가 읽을 수 있게 함
      kube-state-metrics:
        metricLabelsAllowlist:
          - nodes=[alias,node-role]

  # [에러 해결 포인트] 모든 노드가 아닌 마스터 서버 한 곳에서 딱 한 번만 실행합니다.
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true

  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"
    # 마스터 내부 통신 시 프록시 예외 처리
    no_proxy: "localhost,127.0.0.1,{{ groups['master'][0] }}"
