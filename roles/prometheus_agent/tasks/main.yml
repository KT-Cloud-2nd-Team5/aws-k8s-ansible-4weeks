---
# 1. Helm 설치 여부 확인 및 프록시 기반 설치
- name: Helm 설치 여부 확인
  command: helm version
  register: helm_check
  ignore_errors: true
  changed_when: false

- name: Helm 설치 (Proxy 활용)
  become: true
  shell: |
    export http_proxy="{{ proxy_url }}"
    export https_proxy="{{ proxy_url }}"
    curl -4 --proxy "{{ proxy_url }}" -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  when: helm_check.failed

# 2. 필수 파이썬 라이브러리 설치 (Ansible Helm 모듈용)
- name: pip3 및 K8s 라이브러리 설치 (Proxy 활용)
  become: true
  apt:
    name: [python3-pip, python3-kubernetes]
    state: present
    update_cache: yes
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 3. Helm 저장소 추가 및 업데이트
- name: Prometheus Community 저장소 추가
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"

# 4. Prometheus Agent 배포 (Remote Write 설정 포함)
- name: Prometheus Agent 배포
  become: true
  kubernetes.core.helm:
    name: prometheus-agent
    chart_ref: prometheus-community/prometheus
    release_namespace: "{{ my_ns | default('monitoring') }}"
    create_namespace: true
    # 마스터 노드이므로 이 경로가 반드시 존재합니다.
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    values:
      deploymentMode: agent
      server:
        remoteWrite:
          - url: "http://{{ proxy_server_ip }}:9090/api/v1/write"
  environment:
    http_proxy: "{{ proxy_url }}"
    https_proxy: "{{ proxy_url }}"
    no_proxy: "{{ no_proxy_list }}"