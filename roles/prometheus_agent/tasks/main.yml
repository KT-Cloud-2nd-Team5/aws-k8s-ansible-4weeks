---
# 1. Helm 설치 여부 확인
- name: Helm 설치 여부 확인
  command: helm version
  register: helm_check
  ignore_errors: true
  changed_when: false

# 2. Helm 직접 설치 (프록시 적용)
- name: Helm 설치 (Proxy 활용)
  become: true
  shell: |
    curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 get_helm.sh
    ./get_helm.sh
  when: helm_check.failed

# 3. APT 대신 curl로 pip 설치 스크립트 다운로드
- name: (우회) pip 수동 설치 스크립트 다운로드
  become: true
  get_url:
    url: https://bootstrap.pypa.io/get-pip.py
    dest: /tmp/get-pip.py
    validate_certs: no


# 4. 스크립트로 pip 설치 (APT 의존성 제거)
- name: (우회) pip 설치 실행
  become: true
  shell: python3 /tmp/get-pip.py

# 5. 라이브러리 설치 (방금 설치한 pip 사용)
- name: (우회) kubernetes 라이브러리 설치
  become: true
  shell: |
    /usr/local/bin/pip3 install kubernetes
  args:
    executable: /bin/bash

# 6. Helm 저장소 추가
- name: Prometheus Community 저장소 추가
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"

# 7. 에이전트 배포
- name: Prometheus Agent 배포
  become: true
  kubernetes.core.helm:
    name: prometheus-agent
    chart_ref: prometheus-community/prometheus
    release_namespace: "{{ my_ns | default('monitoring') }}"
    create_namespace: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: true
    values:
      deploymentMode: agent

      server:
        enabled: true
        persistentVolume:
          enabled: false
        remoteWrite:
          - url: "http://{{ proxy_server_ip }}:9090/api/v1/write"
        extraArgs:
          enable-feature: agent

      alertmanager:
        enabled: false
      pushgateway:
        enabled: false

      retention: 1h
      kube-state-metrics:
        metricLabelsAllowlist:
          - nodes=[node-role]